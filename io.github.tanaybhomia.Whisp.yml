app-id: io.github.tanaybhomia.Whisp
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: whisp
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home

modules:
  - name: whisp
    buildsystem: meson
    sources:
      - type: dir
        path: .
